# ============================================================
# Starship 提示符配置
# 风格：信息密度高，IC 开发友好
# ============================================================

# 扫描超时（ms）：Windows 文件系统（/mnt/c/）较慢，适当放宽避免警告
scan_timeout = 100
command_timeout = 2000

# 提示符格式（左侧）
format = """
$directory\
$git_branch\
$git_status\
$python\
$cmd_duration\
$line_break\
$character"""

# 右侧提示（仅显示时间，避免干扰）
right_format = "$time"

# ---- 目录 ----
[directory]
style = "bold blue"
truncation_length = 4          # 最多显示 4 层目录
truncate_to_repo = true        # 在 git 仓库内从仓库根目录开始显示
read_only = " 󰌾"
read_only_style = "red"

# ---- Git 分支 ----
[git_branch]
symbol = " "
style = "bold purple"
format = "[$symbol$branch(:$remote_branch)]($style) "

# ---- Git 状态 ----
[git_status]
style = "bold red"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "$${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

# ---- Python（显示 pyenv 版本）----
[python]
symbol = " "
style = "bold yellow"
format = "[$symbol$version( $virtualenv)]($style) "
pyenv_version_name = true      # 显示 pyenv 版本（而非系统 python）
detect_extensions = ["py"]
detect_files = ["*.py", "pyproject.toml", "setup.py", "requirements.txt"]

# ---- 命令执行时间（超过 2 秒显示）----
[cmd_duration]
min_time = 2000               # 2 秒以上才显示
style = "bold yellow"
format = "[ $duration]($style) "

# ---- 时间（右侧提示）----
[time]
disabled = false
style = "bold dimmed white"
format = "[$time]($style)"
time_format = "%H:%M"

# ---- 提示符字符 ----
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"   # Neovim normal 模式提示

# ---- 禁用不常用模块（减少启动开销）----
[package]
disabled = true

[docker_context]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true

[kubernetes]
disabled = true

[terraform]
disabled = true
